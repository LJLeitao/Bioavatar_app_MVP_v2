<!DOCTYPE html>

<title>BioAvatar — Modelos A & B</title>
<style>

}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

button{font:inherit} button:focus-visible{outline:3px solid rgba(86,226,205,.68);outline-offset:2px}
.shell{position:relative;isolation:isolate;width:100%;max-width:390px;height:100svh;max-height:844px;margin:0 auto;overflow:hidden;background:var(--navy);box-shadow:0 30px 90px rgba(0,0,0,.48)}

/* MODEL A */
.model-a{background:radial-gradient(circle at 50% 10%,#155155 0%,#092a2e 31%,#061a1d 74%,#031214 100%);overflow:hidden}.screen-a{height:100%;overflow-y:auto;padding:0 0 84px;scroll-behavior:smooth}.screen-a::-webkit-scrollbar{display:none}
.a-top{padding:12px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}.a-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.15em;font-weight:850;color:#9ccbc6}.a-title{margin:5px 0 0;font-size:25px;line-height:1;font-weight:850}.a-day{font-size:11px;color:var(--muted);font-weight:650;margin-top:6px}.score-pill{border:1px solid rgba(86,226,205,.34);background:rgba(86,226,205,.1);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:800;color:var(--mint)}

.head-score{position:absolute;z-index:5;top:11px;left:50%;transform:translateX(-50%);text-align:center;min-width:89px}.head-score .k{font-size:9px;letter-spacing:.13em;color:#a5d5cf;font-weight:850;text-transform:uppercase}.head-score .score{font-size:35px;line-height:.9;font-weight:900;color:var(--mint);text-shadow:0 0 22px rgba(86,226,205,.45)}.head-score .subl{font-size:10px;color:var(--muted);margin-top:3px}
.metric-pin{position:absolute;z-index:8;min-width:94px;padding:9px 10px;border:1px solid rgba(133,239,224,.31);border-radius:15px;background:linear-gradient(145deg,rgba(11,51,53,.94),rgba(4,25,27,.84));box-shadow:0 8px 24px rgba(0,0,0,.18);backdrop-filter:blur(6px)}.metric-pin:after{content:"";position:absolute;height:1px;background:linear-gradient(90deg,rgba(154,255,239,.74),transparent);top:50%;width:49px}.metric-pin .m-name{font-size:10px;color:#a7c7c3;font-weight:720}.metric-pin .m-val{font-size:19px;font-weight:880;line-height:1.1;margin-top:1px}.metric-pin .m-trend{font-size:9px;font-weight:700;margin-top:2px}.pin-stress{left:15px;top:126px;border-color:rgba(255,196,107,.37)}.pin-stress:after{left:100%}.pin-stress .m-val,.pin-stress .m-trend{color:var(--amber)}.pin-focus{right:15px;top:126px}.pin-focus:after{right:100%;transform:rotate(180deg)}.pin-focus .m-val,.pin-focus .m-trend{color:var(--mint)}.pin-recovery{left:20px;bottom:38px}.pin-recovery:after{left:100%;transform:rotate(-24deg);transform-origin:left}.pin-recovery .m-val,.pin-recovery .m-trend{color:var(--green)}.pin-energy{right:18px;bottom:38px;border-color:rgba(255,196,107,.37)}.pin-energy:after{right:100%;transform:rotate(204deg);transform-origin:right}.pin-energy .m-val,.pin-energy .m-trend{color:var(--amber)}
.status-card{margin:0 18px;background:linear-gradient(135deg,rgba(19,70,69,.92),rgba(9,40,42,.94));border:1px solid var(--line);border-radius:22px;padding:15px 16px;display:flex;gap:12px;align-items:center}.status-orb{width:41px;height:41px;border-radius:14px;background:rgba(255,196,107,.12);color:var(--amber);display:grid;place-items:center;font-size:21px;flex:none}.status-card h3{font-size:14px;margin:0 0 3px}.status-card p{font-size:11.5px;line-height:1.38;margin:0;color:#bdd3d0}.section-head{padding:20px 20px 10px;display:flex;justify-content:space-between;align-items:end}.section-head small{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#95c8c1;font-weight:820}.section-head h2{font-size:18px;margin:3px 0 0}.text-link{background:none;border:0;color:var(--teal);font-size:12px;font-weight:800;cursor:pointer}.daily-strip{display:flex;gap:10px;overflow-x:auto;padding:0 20px 2px;scroll-snap-type:x mandatory}.daily-strip::-webkit-scrollbar{display:none}.daily-mini{min-width:176px;min-height:140px;padding:13px;border-radius:19px;border:1px solid var(--line);background:linear-gradient(145deg,rgba(20,66,66,.95),rgba(8,34,37,.96));scroll-snap-align:start;cursor:pointer}.daily-mini .icon{font-size:26px}.daily-mini b{font-size:13px;display:block;margin:9px 0 4px}.daily-mini span{font-size:10px;color:#b1d0ca;line-height:1.36;display:block}.daily-mini em{display:block;margin-top:9px;color:var(--teal);font-size:10px;font-style:normal;font-weight:820}.a-nav{height:75px;position:absolute;z-index:22;bottom:0;inset-inline:0;background:rgba(4,19,21,.82);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:9px 5px calc(9px + var(--safe))}.a-nav button{color:#95b6b2;cursor:pointer;background:transparent;border:0;flex:1;display:grid;gap:3px;justify-items:center;align-content:center;font-size:10px;font-weight:720}.a-nav i{font-size:18px;font-style:normal;line-height:1}.a-nav button.active{color:var(--teal)}
.a-page{display:none;min-height:100%;padding-bottom:10px}.a-page.active{display:block}.a-page-header{padding:16px 20px 11px}.a-page-header h1{font-size:28px;margin:3px 0}.a-page-header p{font-size:12px;margin:0;color:#bad1cd}.content-stack{padding:0 18px}.bio-card{border:1px solid var(--line);background:linear-gradient(135deg,rgba(18,65,64,.93),rgba(7,33,36,.96));border-radius:22px;padding:15px;margin-bottom:11px}.bio-card h3{font-size:16px;margin:0 0 6px}.bio-card p{margin:0;font-size:12px;line-height:1.45}.stat-bars{height:155px;display:flex;align-items:end;gap:9px;padding:14px 0 0}.bar{flex:1;display:flex;align-items:center;justify-content:end;flex-direction:column;gap:5px}.bar i{display:block;width:100%;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,var(--teal),#177e77)}.bar small{font-size:9px;color:var(--muted)}.metric-list{display:grid;gap:8px}.metric-row{display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(136,218,206,.11)}.metric-row:last-child{border:0}.metric-row .dot{width:28px;height:28px;border-radius:10px;background:rgba(86,226,205,.13);display:grid;place-items:center}.metric-row strong{font-size:13px}.metric-row span{font-size:10px;color:var(--muted);display:block;margin-top:2px}.metric-row b{font-size:13px}.scenario{position:relative;overflow:hidden}.scenario:after{content:"";position:absolute;width:145px;height:145px;border:1px solid rgba(86,226,205,.22);border-radius:50%;right:-54px;bottom:-66px}.scenario .sim{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:12px}.impact{display:grid;gap:5px;align-content:center}.impact span{font-size:11px;color:#b4d2ce}.impact strong{font-size:12px;color:var(--teal)}.goal-ring{width:150px;height:150px;border-radius:50%;margin:12px auto;background:conic-gradient(var(--teal) 0 64%,rgba(86,226,205,.14) 64% 100%);display:grid;place-items:center}.goal-ring div{width:124px;height:124px;border-radius:50%;displ /* MODEL B */
.model-b{background:#0a1f1e;color:var(--ink);overflow:hidden}.city-view{height:100%;position:relative;overflow:hidden}.city-title{position:absolute;z-index:10;top:8px;left:16px;right:16px;padding:10px 16px;background:rgba(10,28,26,.45);border:2px solid rgba(37,181,158,.35);border-radius:18px;box-shadow:0 0 18px rgba(37,181,158,.08),0 6px 20px rgba(0,0,0,.25);backdrop-filter:blur(12px);display:flex;justify-content:space-between;align-items:center}.city-title small{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#5a9e96;font-weight:850}.city-title strong{font-size:15px;display:block;margin-top:2px;color:#eef6f4}.weather{font-size:22px}.city-map{position:absolute;inset:0;padding-top:54px;background:radial-gradient(ellipse at 50% 44%,#0f3530 0%,#091e1c 40%,#050f0e 100%);overflow:hidden}.city-map:before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(37,181,158,.07) 1px,transparent 1px);background-size:28px 28px;opacity:.6}.path{position:absolute;background:#f7eedc;border:3px solid #e7d9bd;border-radius:999px;box-shadow:inset 0 0 0 1px rgba(199,177,138,.25)}.p1{width:330px;height:34px;left:27px;top:337px;transform:rotate(-13deg)}.p2{width:34px;height:340px;left:177px;top:129px;transform:rotate(18deg)}.p3{width:33px;height:230px;left:91px;top:238px;transform:rotate(-38deg)}.p4{width:33px;height:222px;right:82px;top:228px;transform:rotate(42deg)}
.avatar{position:absolute;z-index:9;left:49%;top:67%;width:30px;height:43px;transform:translate(-50%,-50%);transition:left .58s cubic-bezier(.2,.85,.35,1),top .58s cubic-bezier(.2,.85,.35,1);filter:drop-shadow(0 4px 3px rgba(35,60,54,.28))}

.avatar.girl .head:before{width:17px;height:11px;left:0px;top:-4px;background:#5a3a1a;border-radius:10px 10px 2px 2px}
.avatar.girl .head:after{content:"";position:absolute;left:-3px;top:2px;width:5px;height:10px;background:#c06090;border-radius:50%;transform:rotate(-15deg)}
.avatar .body{width:23px;height:21px;margin:-1px auto 0;background:#df6654;border-radius:8px 8px 5px 5px;border:2px solid #654033}
.avatar.girl .body{background:#c06090;border-color:#8a3060}.speech{position:absolute;z-index:12;left:50%;bottom:85px;transform:translateX(-50%);padding:8px 11px;border-radius:13px;background:var(--cream);box-shadow:0 5px 18px rgba(48,79,69,.16);font-size:11px;color:#526b65;font-weight:700;opacity:1;transition:.2s}.speech:after{content:"";position:absolute;left:50%;bottom:-5px;width:10px;height:10px;transform:translateX(-50%) rotate(45deg);background:var(--cream)}.city-bottom{position:absolute;bottom:0;inset-inline:0;z-index:22;padding:9px 18px calc(9px + var(--safe));background:linear-gradient(transparent,rgba(60,99,90,.1)),rgba(255,253,247,.78);backdrop-filter:blur(14px);display:flex;justify-content:space-between;align-items:center}.city-bottom button{border:0;background:transparent;color:#536e67;font-size:11px;font-weight:800;display:grid;gap:2px;justify-items:center;cursor:pointer}.map-button{width:52px;height:52px;border-radius:50%!important;background:#24aaa9!important;color:#fff!important;display:grid!important;place-content:center;box-shadow:0 5px 14px rgba(24,135,132,.25);font-size:22px!important}
.city-panel{position:absolute;z-index:40;inset:8px 11px 10px;background:rgba(255,253,247,.97);border:1px solid rgba(52,92,80,.12);border-radius:27px;box-shadow:0 14px 48px rgba(24,74,61,.28);overflow:auto;transform:translateY(105%);opacity:0;pointer-events:none;transition:transform .36s cubic-bezier(.2,.8,.25,1),opacity .2s;padding-bottom:18px}.city-panel.open{transform:translateY(0);opacity:1;pointer-events:auto}.city-panel::-webkit-scrollbar{display:none}.back-map{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:5px;width:100%;padding:15px 18px 10px;border:0;color:#178f90;background:linear-gradient(#fffdf7 78%,rgba(255,253,247,.86));font-size:12px;font-weight:850;text-align:left;cursor:pointer}.panel-hero{margin:0 13px 13px;padding:18px;border-radius:18px;background:linear-gradient(135deg,var(--panel-color,#468dbb),color-mix(in srgb,var(--panel-color,#468dbb),#ffffff 12%));color:white;position:relative;overflow:hidden}.panel-hero:after{content:"";position:absolute;width:125px;height:125px;border:1px solid rgba(255,255,255,.32);border-radius:50%;right:-33px;bottom:-52px}.panel-hero .big-icon{font-size:35px;line-height:1;position:relative;z-index:1}.panel-hero h2{font-size:24px;line-height:1;margin:7px 0 4px;position:relative;z-index:1}.panel-hero p{color:rgba(255,255,255,.86);font-size:11px;margin:0;position:relative;z-index:1}.panel-content{padding:0 15px}.panel-content h3{font-size:14px;margin:16px 0 8px;color:#293f3a}.map-card{padding:12px;border-radius:15px;background:#fff;border:1px solid rgba(67,109,95,.1);box-shadow:0 5px 12px rgba(46,83,72,.05);margin-bottom:9px}.map-card .line{display:flex;align-items:center;gap:10px}.map-card .round-icon{width:33px;height:33px;border-radius:11px;background:#eef7f4;display:grid;place-items:center;font-size:17px;flex:none}.map-card strong{font-size:13px;font-weight:800;color:#1a3530;display:block;margin-bottom:2px}.map-card span{font-size:11px;color:#6f807a;display:block;margin-top:2px}.map-card .check{margin-left:auto;width:18px;height:18px;border:2px solid #d4e1dc;border-radius:50%;display:grid;place-items:center;color:#21a8a4;font-size:11px}.map-card .check.done{background:#20aaa7;border-color:#20aaa7;color:#fff}.progress-line{height:6px;border-radius:99px;background:#edf0ed;margin-top:10px;overflow:hidden}.progress-line i{display:block;height:100%;border-radius:inherit;background:#458cc1}.focus-score{display:flex;align-items:center;gap:16px;padding:4px 6px 10px}.focus-ring{width:108px;height:108px;border-radius:50%;background:conic-gradient(var(--purple) 0 68%,#ebe8f0 68% 100%);display:grid;place-items:center;flex:none}.focus-ring div{width:84px;height:84px;background:#fffdf7;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#7658b5;font-size:27px}.focus-note{font-size:11px;color:#60726e;line-height:1.42}.focus-note strong{color:#364d47;font-size:14px;display:block;margin-bottom:4px}.chart{height:122px;position:relative;margin:6px 0 10px;border-bottom:1px solid #dfe8e4;background:linear-gradient(#edf3f0 1px,transparent 1px);background-size:100% 31px}.chart svg{width:100%;height:100%;overflow:visible}.stat-pills{display:grid;gap:8px}.city-stat{display:grid;grid-template-columns:27px 1fr auto;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #ecf0ed}.city-stat:last-child{border:0}.city-stat .cs-icon{width:26px;height:26px;border-radius:9px;background:#eef7f4;display:grid;place-items:center;font-size:14px}.city-stat b{font-size:11px}.city-stat small{font-size:9px;color:#73817d;display:block;margin-top:2px}.city-stat strong{font-size:12px}.settings-option{display:flex;align-items:center;justify-content:space-between;padding:14px 1px;border-bottom:1px solid #e6eeea;font-size:12px;font-weight:720}.toggle{width:38px;height:22px;border-radius:99px;background:#d6e3df;padding:3px;cursor:pointer;border:0}.toggle i{display:block;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}.toggle.on{background:#25b2 /* ── HOME REDESIGN: only the first page of Model A ── */

/* ══ MODEL B — CIDADE (CSS limpo e consolidado) ══ */
.model-b{background:#0a1f1e;color:#eef6f4;overflow:hidden}
.city-view{height:100%;position:relative;overflow:hidden}

/* Barra de topo */
.city-title{
  position:absolute;z-index:10;top:8px;left:16px;right:16px;
  padding:10px 16px;
  background:rgba(10,28,26,.45);
  border:2px solid rgba(37,181,158,.35);
  border-radius:18px;
  box-shadow:0 0 18px rgba(37,181,158,.08),0 6px 20px rgba(0,0,0,.25);
  backdrop-filter:blur(12px);
  display:flex;justify-content:space-between;align-items:center
}
.city-title strong{font-size:15px;color:#eef6f4;font-weight:800}
.weather{font-size:22px}

/* Fundo do mapa */
.city-map{
  position:absolute;inset:0;padding-top:54px;
  background:radial-gradient(ellipse at 50% 44%,#0f3530 0%,#091e1c 40%,#050f0e 100%);
  overflow:hidden
}
.city-map:before{
  content:"";position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(37,181,158,.07) 1px,transparent 1px);
  background-size:28px 28px;opacity:.6
}

/* Praça central */
.plaza{
  position:absolute;z-index:4;width:155px;height:155px;
  left:50%;top:43%;transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,#1a3f3c,#0d2422);
  border:3px solid rgba(37,181,158,.35);
  box-shadow:0 0 40px rgba(37,181,158,.12),0 9px 24px rgba(0,0,0,.4);
  display:grid;place-items:center;text-align:center
}
.plaza:before{display:none}
.plaza .over{font-size:9px;color:#5a9e96;font-weight:850;text-transform:uppercase;letter-spacing:.09em;position:relative;z-index:1}
.plaza strong{display:block;font-size:41px;line-height:.82;color:#25b59e;text-shadow:0 0 20px rgba(37,181,158,.4);position:relative;z-index:1}
.plaza span{display:none}

/* Esferas (casas) */
.house{
  position:absolute;z-index:6;
  width:76px;height:104px;
  border:0;background:transparent;cursor:pointer;padding:0;
  overflow:visible;
  transition:transform .15s
}
.house:hover,.house:active{transform:scale(1.08)}
.house:before,.house:after{display:none}
/* Círculo da esfera */
.house .roof{
  width:76px;height:76px;
  border-radius:50%;
  background:rgba(10,28,26,.55);
  border:2.5px solid var(--rc,#25b59e);
  display:grid;place-items:center;
  box-shadow:0 0 18px rgba(0,0,0,.3);
  backdrop-filter:blur(4px);
  clip-path:none;padding:0;margin:0
}
.house .roof:before,.house .roof:after{display:none}
.house .roof .roof-icon{color:var(--rc,#25b59e);display:grid;place-items:center;width:36px;height:36px}
.house .roof .roof-icon svg{width:30px;height:30px;display:block;fill:currentColor;stroke:currentColor}
.house .roof .roof-text{font-size:26px;font-weight:900;color:var(--rc,#25b59e)}
/* O símbolo exterior de Foco conserva o mesmo alvo vazado usado no painel interno. */
.h-focus .roof .roof-icon svg{fill:none!important;stroke:currentColor!important}
.house .building{display:none}
/* Etiqueta abaixo de cada círculo do mapa */
.house label{
  position:absolute;left:50%;top:84px;transform:translateX(-50%);
  display:block;white-space:nowrap;
  padding:5px 9px;border-radius:9px;
  border:1px solid color-mix(in srgb,var(--rc,#25b59e),transparent 58%);
  background:rgba(7,27,26,.88);
  box-shadow:0 5px 13px rgba(0,0,0,.22);
  color:var(--rc,#25b59e);
  font-size:9px;font-weight:850;letter-spacing:.03em;
  line-height:1;
}

/* Cores por esfera — posições calculadas em JS no load */
.h-what    {--rc:#ffb86b}
.h-focus   {--rc:#25b59e}
.h-stress  {--rc:#e36363}
.h-recovery{--rc:#28c98a}

.speech:after{content:"";position:absolute;left:50%;bottom:-5px;width:10px;height:10px;transform:translateX(-50%) rotate(45deg);background:rgba(10,30,28,.9)}

/* Barra inferior */
.city-bottom{position:absolute;bottom:0;inset-inline:0;z-index:22;padding:9px 18px calc(9px + var(--safe));background:rgba(8,22,21,.9);backdrop-filter:blur(14px);border-top:1px solid rgba(37,181,158,.12);display:flex;justify-content:space-between;align-items:center}
.city-bottom button{border:0;background:transparent;color:#5a9e96;font-size:11px;font-weight:800;display:grid;gap:2px;justify-items:center;cursor:pointer}

/* Painel (slide-up) */
.city-panel{position:absolute;z-index:40;inset:8px 11px 10px;border-radius:27px;overflow:auto;transform:translateY(105%);opacity:0;pointer-events:none;transition:transform .36s cubic-bezier(.2,.8,.25,1),opacity .2s;padding-bottom:18px;background:#fffdf7;border:1px solid rgba(52,92,80,.12);box-shadow:0 14px 48px rgba(24,74,61,.28)}

.map-card{padding:12px;border-radius:15px;background:#fff;border:1px solid rgba(var(--pc-rgb,67,109,95),.15);box-shadow:0 5px 12px rgba(46,83,72,.05);margin-bottom:9px;color:#293f3a}

const panel=document.getElementById('cityPanel'), avatar=document.getElementById('avatar'), speech=document.getElementById('speech');

/* ── POSITION HOUSES IN A CIRCLE AROUND PLAZA ── */
function positionHouses(){
  const map=document.getElementById('cityMap');
  const plaza=map.querySelector('.plaza');
  const pr=plaza.getBoundingClientRect();
  const mr=map.getBoundingClientRect();
  // plaza center relative to map
  const cx=pr.left-mr.left+pr.width/2;
  const cy=pr.top -mr.top +pr.height/2;
  const R=148; // orbital radius px
  const S=38;  // half of house size (76/2)
  // angles: What=270°(top), Focus=210°(left-top), Stress=330°(right-top), Recovery=150°(left-bot), Stats=30°(right-bot)
  const houses=[
    {sel:'.h-what',    a:270},
    {sel:'.h-focus',   a:210},
    {sel:'.h-stress',  a:330},
    {sel:'.h-recovery',a:150},
    {sel:'.h-stats',   a:30},
  ];
  houses.forEach(({sel,a})=>{
    const el=map.querySelector(sel); if(!el) return;
    const rad=a*Math.PI/180;
    const x=cx+R*Math.cos(rad)-S;
    const y=cy+R*Math.sin(rad)-S;
    el.style.left=x+'px';
    el.style.top=y+'px';
    el.style.right='auto';
  });
  // posição inicial: avatar mesmo por cima do balão "Navega pelo mapa"
  const sr=speech.getBoundingClientRect();
  avatar.style.left=(sr.left-mr.left+sr.width/2)+'px';
  avatar.style.top=(sr.top-mr.top-28)+'px';
}
window.addEventListener('load',positionHouses);
window.addEventListener('resize',positionHouses);

/* ── CARD STATE PERSISTENCE ── */
// Cards are keyed by panel + card title. Reset daily (by date).
const today = new Date().toISOString().slice(0,10);
function cardKey(panelKey, title){ return `ba_card_${today}_${panelKey}_${title.replace(/\s+/g,'_')}`; }
function saveCard(panelKey, title){ try{localStorage.setItem(cardKey(panelKey,title),'1');}catch(e){} }
function isCardDone(panelKey, title){ try{return localStorage.getItem(cardKey(panelKey,title))==='1';}catch(e){return false;} }

function openCity(key){
  const item=panelData[key]; if(!item)return;
  const heroIcon = iconSVG[item.icon] || item.icon;
  panel.innerHTML=`<button class="back-map" id="backMap" style="--pc:${item.color}">←&nbsp; Voltar para o mapa</button><div class="panel-hero" style="--pc:${item.color};--panel-color:${item.color}"><div class="big-icon">${heroIcon}</div><h2>${item.title}</h2><p>${item.subtitle}</p></div><div class="panel-content" style="--pc:${item.color}">${item.body}</div>`;
  panel.style.setProperty('--pc', item.color);
  panel.classList.add('open');
  panel.querySelector('#backMap').addEventListener('click',closeCity);
  panel.querySelectorAll('.toggle').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));
  panel.querySelectorAll('.complete-city-card').forEach(btn=>{
    const title=btn.closest('.map-card')?.querySelector('strong')?.textContent||'';
    if(isCardDone(key,title)){btn.textContent='Concluído ✓';btn.disabled=true;btn.classList.add('secondary');}
    btn.addEventListener('click',()=>{
      const t=btn.closest('.map-card')?.querySelector('strong')?.textContent||'';
      saveCard(key,t);btn.textContent='Concluído ✓';btn.disabled=true;btn.classList.add('secondary');
    });
  });
  panel.querySelectorAll('.settings-option.is-clickable').forEach(row=>row.addEventListener('click',()=>handleSettingsAction(row.dataset.link,row)));
}
function handleSettingsAction(key,row){
  const feedback = panel.querySelector('#settingsFeedback');
  if(!feedback)return;
  if(key==='apple-health') feedback.textContent='Apple Health aberto. A sincronização está ativa e os dados foram atualizados agora mesmo.';
  if(key==='whoop') feedback.textContent='Whoop aberto. A pulseira está ligada e a última sincronização foi concluída com sucesso.';
  if(key==='privacy') feedback.textContent='Privacidade aberta. Aqui podes gerir permissões, partilha de dados e preferências de sincronização.';
}
function closeCity(){
  panel.classList.remove('open');
  speech.textContent='Navega pelo mapa';
  speech.style.opacity='1';
  // ao voltar ao mapa inicial, o avatar regressa para cima do texto inicial
  requestAnimationFrame(positionHouses);
}
document.querySelectorAll('.house').forEach(h=>h.addEventListener('click',()=>{
  const [x,y]=h.dataset.pos.split(','); avatar.style.left=x+'%';avatar.style.top=y+'%';
  speech.textContent='A entrar em '+h.querySelector('label').textContent.replace(/ ·.*/, ''); speech.style.opacity='1';
  setTimeout(()=>{openCity(h.dataset.city);speech.style.opacity='0'},420);
}));

/* ── PROFILE EDIT ── */
let currentAvatar='boy';
const avatarSVGs={
  boy:`<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="48" height="48"><circle cx="24" cy="24" r="24" fill="#1b6663"/><circle cx="24" cy="18" r="9" fill="#d99a6b"/><path d="M8 44 Q8 32 24 32 Q40 32 40 44" fill="#df6654"/><path d="M17 12 Q17 6 24 6 Q31 6 31 12" fill="#4b3023"/></svg>`,
  girl:`<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="48" height="48"><circle cx="24" cy="24" r="24" fill="#4a6663"/><circle cx="24" cy="18" r="9" fill="#e8b49a"/><path d="M8 44 Q8 32 24 32 Q40 32 40 44" fill="#c06090"/><path d="M15 11 Q15 5 24 5 Q33 5 33 11 Q33 7 29 6 Q26 9 24 9 Q22 9 19 6 Q15 7 15 11Z" fill="#5a3a1a"/><path d="M13 15 Q12 8 24 8 Q36 8 35 15" fill="none" stroke="#5a3a1a" stroke-width="2"/></svg>`
};
function openProfileEdit(){
  const m=panel.querySelector('#profileEditModal');
  if(!m)return;
  m.style.display=m.style.display==='none'?'block':'none';
}
function selectAvatar(type){
  currentAvatar=type;
  const boy=panel.querySelector('#avatarOptBoy');
  const girl=panel.querySelector('#avatarOptGirl');
  if(!boy||!girl)return;
  boy.style.borderColor=type==='boy'?'#25a9a5':'transparent';
  boy.querySelector('div').style.color=type==='boy'?'#25a9a5':'#6f807a';
  girl.style.borderColor=type==='girl'?'#25a9a5':'transparent';
  girl.querySelector('div').style.color=type==='girl'?'#25a9a5':'#6f807a';
}
function saveProfileEdit(){
  const nameInput=panel.querySelector('#profileNameInput');
  const nameDisplay=panel.querySelector('#profileNameDisplay');
  const avatarDisplay=panel.querySelector('#profileAvatarDisplay');
  const newName=nameInput?nameInput.value.trim():'';
  // update panel display
  if(nameDisplay&&newName) nameDisplay.textContent=newName;
  if(avatarDisplay) avatarDisplay.innerHTML=avatarSVGs[currentAvatar];
  // update map greeting with first name
  const greeting=document.getElementById('cityGreeting');
  if(greeting&&newName){
    const firstName=newName.split(' ')[0];
    greeting.textContent='Bom dia '+firstName;
  }
  // update map avatar style (boy/girl class)
  avatar.classList.toggle('girl', currentAvatar==='girl');
  const m=panel.querySelector('#profileEditModal');
  if(m) m.style.display='none';
}
function cancelProfileEdit(){
  const m=panel.querySelector('#profileEditModal');
  if(m) m.style.display='none';
}
function openGoalEdit(){
  const m=panel.querySelector('#goalEditModal');
  if(m) m.style.display=m.style.display==='none'?'block':'none';
}
function setGoal(val){
  const d=panel.querySelector('#goalDisplay');
  if(d) d.textContent=val;
  panel.querySelectorAll('.goal-opt').forEach(b=>{
    const active=b.textContent.startsWith(val);
    b.style.background=active?'#e8f7f5':'#f5faf9';
    b.style.borderColor=active?'#25a9a5':'#d0e8e4';
    b.style.color=active?'#25a9a5':'#293f3a';
    b.style.fontWeight=active?'800':'normal';
    b.textContent=active?val+' ✓':b.textContent.replace(' ✓','');
  });
  const m=panel.querySelector('#goalEditModal');
  setTimeout(()=>{if(m)m.style.display='none';},400);
}
function openActivityEdit(){
  const m=panel.querySelector('#activityEditModal');
  if(m) m.style.display=m.style.display==='none'?'block':'none';
}
function setActivity(val){
  const d=panel.querySelector('#activityDisplay');
  if(d) d.textContent=val;
  panel.querySelectorAll('.act-opt').forEach(b=>{
    const active=b.textContent.startsWith(val);
    b.style.background=active?'#e8f7f5':'#f5faf9';
    b.style.borderColor=active?'#25a9a5':'#d0e8e4';
    b.style.color=active?'#25a9a5':'#293f3a';
    b.style.fontWeight=active?'800':'normal';
    b.textContent=active?val+' ✓':b.textContent.replace(' ✓','');
  });
  const m=panel.querySelector('#activityEditModal');
  setTimeout(()=>{if(m)m.style.display='none';},400);
}
</script>
